name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Build Web Application
      env:
        SECRET_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
      run: |
        # यहाँ दोनों वेरिएबल्स को .env फ़ाइल में लिखा जा रहा है ताकि कोई भी मिसमैच न हो
        echo "VITE_GEMINI_API_KEY=$SECRET_KEY" > .env
        echo "GEMINI_API_KEY=$SECRET_KEY" >> .env
        npm run build

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Initialize Capacitor Android
      run: |
        npx cap init "Inkscape AI Storyteller" "com.takano3d.storyteller" --web-dir=dist || true
        npx cap add android || true
        npx cap sync

    - name: Fix Kotlin Duplicate Classes (Gradle Constraint)
      run: |
        sed -i '/dependencies {/a \    constraints {\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") { because("Fix duplicate class error") }\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") { because("Fix duplicate class error") }\n    }' android/app/build.gradle

    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
