name: Build Android APK

on:
  push:
    branches:
      - main  # जब भी आप मेन ब्रांच पर पुश करेंगे, यह अपने आप बिल्ड होना शुरू हो जाएगा
  workflow_dispatch: # इससे आप खुद भी बटन दबाकर बिल्ड शुरू कर सकते हैं

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 20

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Build Web Application
      run: npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Initialize Capacitor Android
      run: |
        npx cap init "Inkscape AI Storyteller" "com.takano3d.storyteller" --web-dir=dist || true
        npx cap add android || true
        npx cap sync

    - name: Add Internet Permission to AndroidManifest
      run: |
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" \/>' android/app/src/main/AndroidManifest.xml

    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
